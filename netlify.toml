# Netlify-Konfiguration — wird automatisch beim Deploy gelesen.
# Quelle: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Kein Build-Schritt — wir deployen statisches HTML direkt aus dem deploy/-Ordner.
  publish = "deploy"

# ── Netlify Functions (Backend) ──────────────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Security Headers für alle Seiten ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Verhindert Clickjacking (Quiz darf nicht in iframes fremder Seiten)
    X-Frame-Options = "DENY"
    # Verhindert MIME-Sniffing-Angriffe
    X-Content-Type-Options = "nosniff"
    # Moderne, datenschutzfreundliche Referrer-Policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Keine Kamera/Mikrofon/Geolocation-Anfragen zulassen
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HTTPS für 1 Jahr erzwingen (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Caching ────────────────────────────────────────────────────────────
# HTML-Seiten: kurzes Caching, damit Updates schnell live gehen
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Statische Assets: langes Caching (CSS/JS ändern sich praktisch nie hier)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Domain-Redirect: haarquiz.ch → haar-analyse.ch ───────────────────
[[redirects]]
  from = "https://haarquiz.ch/*"
  to = "https://haar-analyse.ch/:splat"
  status = 301
  force = true

# ── Redirects für alternative URL-Pfade ──────────────────────────────
# z.B. haarquiz.ch/quiz → haarquiz.ch
[[redirects]]
  from = "/quiz"
  to = "/"
  status = 301

[[redirects]]
  from = "/haarquiz"
  to = "/"
  status = 301

# ── Partner-Funnel: /team/{slug}/analyse ─────────────────────────────
# Mehr-Partner-Funnel. status=200 = Rewrite (URL bleibt sichtbar, /index.html
# wird ausgeliefert). Das Quiz liest den Slug aus dem Pfad und ordnet den Lead zu.
[[redirects]]
  from = "/team/:slug/analyse"
  to = "/index.html"
  status = 200

# Nackter Partner-Pfad /team/{slug} zeigt vorerst ebenfalls die Analyse
# (Stufe 0). In Stufe 2 wird hier die editierbare Partner-Landingpage ausgeliefert.
[[redirects]]
  from = "/team/:slug"
  to = "/index.html"
  status = 200

# ── API-Rewrite zur Netlify Function ─────────────────────────────────
# Fallback für den Fall, dass `config.path` in der Function nicht greift.
# Status 200 = Rewrite (URL bleibt sichtbar), nicht Redirect.
[[redirects]]
  from = "/api/submit-quiz"
  to = "/.netlify/functions/submit-quiz"
  status = 200
