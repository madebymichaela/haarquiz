# Netlify-Konfiguration — wird automatisch beim Deploy gelesen.
# Quelle: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Kein Build-Schritt — wir deployen statisches HTML direkt aus dem deploy/-Ordner.
  publish = "deploy"

# ── Netlify Functions (Backend) ──────────────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Security Headers für alle Seiten ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Verhindert Clickjacking (Quiz darf nicht in iframes fremder Seiten)
    X-Frame-Options = "DENY"
    # Verhindert MIME-Sniffing-Angriffe
    X-Content-Type-Options = "nosniff"
    # Moderne, datenschutzfreundliche Referrer-Policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Keine Kamera/Mikrofon/Geolocation-Anfragen zulassen
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # HTTPS für 1 Jahr erzwingen (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Caching ────────────────────────────────────────────────────────────
# HTML-Seiten: kurzes Caching, damit Updates schnell live gehen
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Statische Assets: langes Caching (CSS/JS ändern sich praktisch nie hier)
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Domain-Redirect: haarquiz.ch → haar-analyse.ch ───────────────────
[[redirects]]
  from = "https://haarquiz.ch/*"
  to = "https://haar-analyse.ch/:splat"
  status = 301
  force = true

# ── Redirects für alternative URL-Pfade ──────────────────────────────
# z.B. haarquiz.ch/quiz → haarquiz.ch
[[redirects]]
  from = "/quiz"
  to = "/"
  status = 301

[[redirects]]
  from = "/haarquiz"
  to = "/"
  status = 301

# ── Partner-Funnel + Landingpages: /team/... ─────────────────────────
# Reihenfolge zaehlt (erste passende Regel gewinnt). status=200 = Rewrite,
# die URL bleibt sichtbar. Dieselben Regeln liegen zur Sicherheit auch in
# deploy/_redirects, weil die Root-netlify.toml je nach Deploy-Weg nicht greift.
#
# 1) Quiz-Funnel der Partnerin (unveraendert).
[[redirects]]
  from = "/team/:slug/analyse"
  to = "/index.html"
  status = 200
# 1b) Partner-bewusste Rechtsseiten (server-seitig, recht.mjs). VOR der Landingpage-Regel.
[[redirects]]
  from = "/team/:slug/impressum"
  to = "/.netlify/functions/recht?doc=impressum&slug=:slug"
  status = 200
[[redirects]]
  from = "/team/:slug/datenschutz"
  to = "/.netlify/functions/recht?doc=datenschutz&slug=:slug"
  status = 200
# 2) Partner-Landingpage (server-seitig aus Airtable gerendert).
[[redirects]]
  from = "/team/:slug"
  to = "/.netlify/functions/landingpage?slug=:slug"
  status = 200

# ── Rechtsseiten ohne Slug (nackte Domain -> Default Michaela) ────────
# Eine Quelle (recht.mjs) fuer alle Impressum/Datenschutz-Seiten. Die alten
# statischen /impressum.html und /datenschutz.html werden per force ueberschrieben.
[[redirects]]
  from = "/impressum"
  to = "/.netlify/functions/recht?doc=impressum"
  status = 200
[[redirects]]
  from = "/datenschutz"
  to = "/.netlify/functions/recht?doc=datenschutz"
  status = 200
[[redirects]]
  from = "/impressum.html"
  to = "/.netlify/functions/recht?doc=impressum"
  status = 200
  force = true
[[redirects]]
  from = "/datenschutz.html"
  to = "/.netlify/functions/recht?doc=datenschutz"
  status = 200
  force = true
# 3) Team-Uebersicht.
[[redirects]]
  from = "/team"
  to = "/.netlify/functions/landingpage"
  status = 200

# ── API-Rewrite zur Netlify Function ─────────────────────────────────
# Fallback für den Fall, dass `config.path` in der Function nicht greift.
# Status 200 = Rewrite (URL bleibt sichtbar), nicht Redirect.
[[redirects]]
  from = "/api/submit-quiz"
  to = "/.netlify/functions/submit-quiz"
  status = 200

# ── Netlify Image CDN: erlaubte Fremd-Bildquellen ────────────────────
# Die Partner-Landingpage liefert Bilder ueber /.netlify/images aus.
# Airtable-Anhaenge (temporaere URLs) muessen hier freigegeben sein.
# Spaeter (Editor) werden Bilder in Netlify Blobs kopiert -> dann kann
# die Airtable-Domain hier wieder raus.
[images]
  remote_images = [
    "https://v5.airtableusercontent.com/.*",
    "https://dl.airtable.com/.*"
  ]
